name: Publish Artifacts

on:
  push:
    tags:
      - '*'

env:
  JRELEASER_GPG_SECRET_KEY: ${{ secrets.SIGNING_KEY }}
  JRELEASER_GPG_PASSPHRASE: ${{ secrets.SIGNING_PASSWORD }}
  JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME: ${{ secrets.NEXUS_USERNAME }}
  JRELEASER_MAVENCENTRAL_SONATYPE_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
  JRELEASER_NEXUS2_SNAPSHOTS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
  JRELEASER_NEXUS2_SNAPSHOTS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}

jobs:
  PublishToStaging:
    runs-on: ubuntu-latest
    if: ${{ !endsWith(github.ref_name, '-SNAPSHOT') }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v6
      - name: Publish to Sonatype
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: make publish-to-sonatype

  PublishToSnapshot:
    runs-on: ubuntu-latest
    if: ${{ endsWith(github.ref_name, '-SNAPSHOT') }}
    env:
      JRELEASER_SIGNING_ACTIVE: NEVER
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v6
      - name: Publish to Sonatype Snapshot
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: make publish-to-sonatype-snapshot

  DispatchReleaseEvent:
    runs-on: ubuntu-latest
    needs: [PublishToStaging, PublishToSnapshot]
    if: ${{ always() && (needs.PublishToStaging.result == 'success' || needs.PublishToSnapshot.result == 'success') }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Dispatch Release Event
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          repository: kensa-dev/kensa
          event-type: kensa-release
          client-payload: '{"version": "${{ github.ref_name }}"}'
