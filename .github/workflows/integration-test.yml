name: Integration Test

on:
  push:
    branches: [master]

jobs:
  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: kensa

      - uses: actions/checkout@v6
        with:
          repository: kensa-dev/clearwave-kensa-example
          path: clearwave-kensa-example

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Publish Kensa to Maven Local
        run: ./gradlew publishToMavenLocal
        working-directory: kensa

      - name: Build clearwave example
        run: ./gradlew build
        working-directory: clearwave-kensa-example
