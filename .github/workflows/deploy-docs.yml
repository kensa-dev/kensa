name: Deploy Docs

on:
  push:
    branches: [master]
    paths:
      - 'kensa.dev/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: kensa.dev/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: kensa.dev

      - name: Build
        run: npm run build
        working-directory: kensa.dev

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: kensa.dev/build
